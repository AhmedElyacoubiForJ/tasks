# Dass deine Init-Skripte korrekt laufen, kannst du auf drei Wegen sicherstellen und prüfen:
#1. Die Logs (Der direkte Weg)
#Wenn der Container das erste Mal startet (und das Volume leer ist), führt Postgres alle Skripte in /docker-entrypoint-initdb.d/ aus. Suche in den Logs nach diesen Zeilen:
#
#docker compose -f docker-compose-dev.yml logs -f db
#
#Achte auf Ausgaben wie:
#
#* /usr/local/bin/docker-entrypoint.sh: running /docker-entrypoint-initdb.d/init-dev-db.sh
#* PostgreSQL init process complete; ready for start up.
#
#2. Prüfung in der Datenbank
#Verbinde dich direkt mit der Datenbank und schaue nach, ob deine Tabellen oder der APP_DB_USER existieren:
#
#docker exec -it postgres-dev psql -U admin -d tasks_dev_db -c "\du"# Oder um Tabellen zu listen:
#docker exec -it postgres-dev psql -U admin -d tasks_dev_db -c "\dt"
#
#3. Wichtiger Check für dein Skript
#Da du jetzt auf Postgres 18+ bist, hat sich am Mechanismus für Init-Skripte nichts geändert, aber ein häufiger Fehler ist das Rechte-Problem. Stelle sicher, dass dein Skript auf dem Host ausführbar ist:
#
#chmod +x init-dev-db.sh
#
#Ein kleiner Tipp für dein init-dev-db.sh:
#Da du in der docker-compose Variablen wie APP_DB_USER definierst, sollte dein Skript diese mit "$APP_DB_USER" verwenden, damit sie dynamisch aus der .env.compose-dev gezogen werden.
#Soll ich mir den Inhalt deines Init-Skripts kurz ansehen, um sicherzugehen, dass die Variablen dort richtig verarbeitet werden?

# Dein Skript sieht sehr gut aus und wird auch in der neuen Struktur von Postgres 18+ tadellos funktionieren. Die Verwendung von set -e und ON_ERROR_STOP=1 ist best practice, um Fehler im Setup sofort zu bemerken.
#Zwei kleine Details solltest du für einen reibungslosen Ablauf beachten:
#
#   1. Variablen-Handling: In Bash-Skripten, die SQL-Befehle per psql absetzen, ist es sicherer, die Variablen in Anführungszeichen zu setzen (falls Sonderzeichen im Passwort sind), also: PASSWORD '$APP_DB_PASSWORD'. Das hast du bereits getan – perfekt.
#   2. Schema-Berechtigungen: Seit Postgres 15+ hat sich das Standardverhalten für das public-Schema geändert (User dürfen dort standardmäßig keine Tabellen mehr erstellen). Dein Befehl GRANT CREATE ON SCHEMA public TO $APP_DB_USER; löst genau dieses Problem für deine Applikation.
#
#Ein wichtiger Hinweis zum Testen:
#Da das Skript nur beim ersten Erstellen des Volumes ausgeführt wird, musst du zum Testen von Änderungen am Skript zwingend das Volume löschen:
#
#docker compose -f docker-compose-dev.yml down -v
#docker compose -f docker-compose-dev.yml up --build
#
#Möchtest du, dass wir auch kurz die Spring Boot Konfiguration (application.properties oder yml) prüfen, um sicherzustellen, dass die Verbindung mit dem neuen $APP_DB_USER nahtlos klappt?