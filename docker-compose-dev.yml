# Das ist eine bekannte Fehlermeldung bei neueren Postgres-Images (ab Version 18+).
# Die Ordnerstruktur hat sich geändert: Statt direkt in /var/lib/postgresql/data erwartet Docker die Daten nun in einem versionsspezifischen Unterordner (z. B. /var/lib/postgresql/18/data).
#Hier sind die zwei gängigsten Wege, das zu beheben:
#1. Der schnelle Fix (wenn die Daten egal sind)
#Falls das eine frische Entwickler-Instanz ist und du keine wichtigen Daten verlierst: Lösche einfach das lokale Volume oder den Ordner, den du an den Container gebunden hast. Beim nächsten Start legt Postgres die neue Struktur korrekt an.
#2. Der manuelle Fix (Daten behalten)
#Postgres weigert sich zu starten, weil es "alte" Daten im Hauptverzeichnis findet. Du kannst sie manuell verschieben:
#
#   1. Stoppe den Container.
#   2. Gehe in dein lokales Datenverzeichnis auf dem Host-Rechner.
#   3. Erstelle einen Unterordner für deine Version (z. B. 18).
#   4. Verschiebe den kompletten Inhalt (alle Dateien aus data/) in diesen neuen Ordner 18/data/.
#   5. Passe dein Mount-Ziel im Docker-Befehl oder in der docker-compose.yaml an:
#   * Alt: /dein/pfad:/var/lib/postgresql/data
#      * Neu: /dein/pfad:/var/lib/postgresql
#
#Wichtig: Das Image sucht jetzt automatisch nach dem passenden Unterverzeichnis.
#Soll ich dir zeigen, wie du deine docker-compose.yaml anpassen musst, damit das dauerhaft funktioniert?

# Ja, die Anpassung in der docker-compose-dev.yml ist jetzt korrekt.
