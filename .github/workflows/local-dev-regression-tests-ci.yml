name: Local Dev Regression Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  local-dev-regression-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Start Application (local-dev)
        run: |
          nohup ./mvnw spring-boot:run -Dspring-boot.run.profiles=local-dev &
          echo "Warte auf App-Start..."
          sleep 30

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run Regression TestSuite
        run: ./mvnw -Dtest=TaskListsCrudTestSuite test

      - name: Show App Logs (falls Fehler)
        if: failure()
        run: |
          echo "Logs der Anwendung:"
          cat target/spring.log || echo "Keine Logdatei gefunden"
